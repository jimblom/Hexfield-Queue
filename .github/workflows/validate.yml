name: Validate Queue Files

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate .queue.yaml files
        run: node scripts/validate.js examples/*.queue.yaml

      - name: Export examples to Apple Music CSV
        run: |
          for f in examples/*.queue.yaml; do
            node scripts/export-apple-music.js "$f"
          done

      - name: Export examples to iTunes XML
        run: |
          for f in examples/*.queue.yaml; do
            node scripts/export-itunes-xml.js "$f"
          done

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apple-music-csvs
          path: "*.csv"
          retention-days: 30

      - name: Upload iTunes XML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: itunes-xml
          path: "*.xml"
          retention-days: 30
